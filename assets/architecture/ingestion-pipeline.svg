<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" role="img" aria-labelledby="title">
  <title id="title">Document Ingestion Pipeline</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b14"/><stop offset="100%" stop-color="#0f1b2d"/>
    </linearGradient>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="900" height="200" fill="url(#bg)"/>
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">Ingestion Pipeline</text>
  <!-- nodes -->
  <g font-family="Inter,Segoe UI,sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">
    <rect x="20" y="80" width="95" height="50" rx="12" fill="#111827" stroke="#34d399"/>
    <text x="67" y="110">Upload PDF</text>
    <line x1="115" y1="105" x2="135" y2="105" stroke="#34d399" stroke-width="2" marker-end="url(#a)"/>

    <rect x="135" y="80" width="95" height="50" rx="12" fill="#111827" stroke="#38bdf8"/>
    <text x="182" y="110">Cloudinary</text>
    <line x1="230" y1="105" x2="250" y2="105" stroke="#34d399" stroke-width="2" marker-end="url(#a)"/>

    <rect x="250" y="80" width="95" height="50" rx="12" fill="#111827" stroke="#a78bfa"/>
    <text x="297" y="110">PyMuPDF</text>
    <line x1="345" y1="105" x2="365" y2="105" stroke="#34d399" stroke-width="2" marker-end="url(#a)"/>

    <rect x="365" y="80" width="95" height="50" rx="12" fill="#111827" stroke="#fbbf24"/>
    <text x="412" y="110">Chunking</text>
    <line x1="460" y1="105" x2="480" y2="105" stroke="#34d399" stroke-width="2" marker-end="url(#a)"/>

    <rect x="480" y="80" width="100" height="50" rx="12" fill="#111827" stroke="#f472b6"/>
    <text x="530" y="102">Outline</text>
    <text x="530" y="118">Nodes</text>
    <line x1="580" y1="105" x2="600" y2="105" stroke="#34d399" stroke-width="2" marker-end="url(#a)"/>

    <rect x="600" y="80" width="100" height="50" rx="12" fill="#111827" stroke="#38bdf8"/>
    <text x="650" y="110">Embeddings</text>
    <line x1="700" y1="105" x2="720" y2="105" stroke="#34d399" stroke-width="2" marker-end="url(#a)"/>

    <rect x="720" y="80" width="150" height="50" rx="12" fill="#111827" stroke="#f43f5e"/>
    <text x="795" y="102">Qdrant</text>
    <text x="795" y="118">Chunks + Nodes</text>
  </g>
  <text x="450" y="175" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="12">Background: summary-index clustering + MMR representatives ’ MongoDB</text>
</svg>
