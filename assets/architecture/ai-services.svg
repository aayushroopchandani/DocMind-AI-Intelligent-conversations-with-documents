<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title">
  <title id="title">AI Services Map</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b14"/><stop offset="100%" stop-color="#101828"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">AI Services</text>

  <rect x="260" y="60" width="280" height="48" rx="14" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="14">Intent Router</text>

  <g font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">
    <rect x="40" y="140" width="160" height="52" rx="12" fill="#0f172a" stroke="#38bdf8"/><text x="120" y="171">Chat / RAG</text>
    <rect x="220" y="140" width="160" height="52" rx="12" fill="#0f172a" stroke="#38bdf8"/><text x="300" y="171">Retrieval</text>
    <rect x="400" y="140" width="160" height="52" rx="12" fill="#0f172a" stroke="#38bdf8"/><text x="480" y="171">Embeddings</text>
    <rect x="580" y="140" width="180" height="52" rx="12" fill="#0f172a" stroke="#38bdf8"/><text x="670" y="171">Prompt Builder</text>

    <rect x="40" y="220" width="160" height="52" rx="12" fill="#0f172a" stroke="#34d399"/><text x="120" y="251">Memory</text>
    <rect x="220" y="220" width="160" height="52" rx="12" fill="#0f172a" stroke="#34d399"/><text x="300" y="251">Streaming</text>
    <rect x="400" y="220" width="160" height="52" rx="12" fill="#0f172a" stroke="#a78bfa"/><text x="480" y="251">Summarization</text>
    <rect x="580" y="220" width="180" height="52" rx="12" fill="#0f172a" stroke="#a78bfa"/><text x="670" y="251">Quiz Pipelines</text>
  </g>

  <rect x="120" y="300" width="560" height="70" rx="14" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <text x="400" y="328" text-anchor="middle" fill="#fbbf24" font-family="Inter,Segoe UI,sans-serif" font-size="13" font-weight="700">Research &amp; Data Analysis Agent</text>
  <text x="400" y="350" text-anchor="middle" fill="#e2e8f0" font-family="Inter,Segoe UI,sans-serif" font-size="12">Table extract · Validate · LangGraph plan/execute · Charts · Dashboards</text>

  <text x="400" y="410" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="12" font-weight="600">EXTERNAL DEPENDENCIES</text>
  <g font-family="Inter,Segoe UI,sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">
    <rect x="60" y="430" width="150" height="70" rx="14" fill="#0f172a" stroke="#fbbf24"/><text x="135" y="460" fill="#fbbf24" font-size="11" font-weight="700">OPENROUTER</text><text x="135" y="480">Gemini</text>
    <rect x="240" y="430" width="150" height="70" rx="14" fill="#0f172a" stroke="#60a5fa"/><text x="315" y="460" fill="#60a5fa" font-size="11" font-weight="700">OPENAI</text><text x="315" y="480">Embeddings</text>
    <rect x="420" y="430" width="150" height="70" rx="14" fill="#0f172a" stroke="#f43f5e"/><text x="495" y="460" fill="#f43f5e" font-size="11" font-weight="700">QDRANT</text><text x="495" y="480">Vectors</text>
    <rect x="600" y="430" width="150" height="70" rx="14" fill="#0f172a" stroke="#22c55e"/><text x="675" y="460" fill="#22c55e" font-size="11" font-weight="700">MONGODB</text><text x="675" y="480">State + Tables</text>
  </g>

  <text x="400" y="545" text-anchor="middle" fill="#94a3b8" font-family="Inter,Segoe UI,sans-serif" font-size="12">Shipped: table ingestion · In progress: LangGraph research graphs &amp; auto dashboards</text>
